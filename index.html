<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>TWS: PHOTOBOOTH</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: #d6eaf8;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* нҷ”л©ҙ м „нҷҳ */
.screen { display: none; width: 100%; min-height: 100vh; min-height: 100dvh; }
.screen.active { display: flex; align-items: center; justify-content: center; }

/* н”ҢлһҳмӢң */
.flash-overlay {
  position: fixed; inset: 0;
  background: #fff; opacity: 0;
  pointer-events: none; z-index: 9999;
  transition: opacity 0.08s;
}

/* --------------------------------
   1лӢЁкі„: мқёнҠёлЎң
-------------------------------- */
.intro-wrap {
  position: relative;
  width: min(340px, 95vw);
}

.intro-card {
  position: relative;
  width: min(340px, 95vw);
  height: min(523px, calc(95vw * 523 / 340));
  /* вң… л°°кІҪ мқҙлҜём§Җ */
  background-image: url('img/background.png');
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* мқёнҠёлЎң мң„м—җ мҳ¬лқјмҳӨлҠ” мқҙлҜём§Җ */
.intro-title-img {
  width: 88%;
  animation: fadeUp 0.9s ease 0.3s both;
}
.intro-title-img.fly-up {
  animation: flyUp 0.6s cubic-bezier(0.4,0,0.2,1) forwards;
}



/* --------------------------------
   2лӢЁкі„: нҸ¬нҶ л¶ҖмҠӨ л©”мқё
-------------------------------- */
.booth-wrap {
  position: relative;
  width: min(340px, 95vw);
}

.card {
  position: relative;
  width: min(340px, 95vw);
  height: min(523px, calc(95vw * 523 / 340));
  /* вң… нҸ¬нҶ л¶ҖмҠӨ н”„л Ҳмһ„ л°°кІҪ */
  background-image: url('img/background.png');
  background-size: cover;
  background-position: center;
}

/* л Ҳмқҙм–ҙ мқҙлҜём§Җл“Ө */
.layer {
  position: absolute; left: 50%;
  transform: translateX(-50%);
  pointer-events: none;
}
.layer-title { top: 5%;  width: 85%; z-index: 20; }
.layer-clip  { top: 15%; width: 25%; z-index: 40; }
.layer-frame { top: 18%; width: 85%; z-index: 10; }

.deco-layer {
  position: absolute;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.deco-layer.show { opacity: 1; }

/* л§Ҳм§Җл§ү м—җм…Ӣ мң„м№ҳ мЎ°м • */
.deco-b1     { top: 22%; left: 2%;  width: 10%; z-index: 50; }
.deco-b2 { top: 1%; left: 10%; width: 5%; z-index: 50; }
.deco-tape1 { top: 0%; left: 5%; width: 8%; height: 30%; z-index: 15; }
.deco-tape2 { bottom: 8%; right: 0%; left: auto; width: 55%; z-index: 45; }
.deco-stamp  { top: 20%; right: 10%; width: 18%; z-index: 50; }
.deco-seal  { bottom: 14%; left: 12%; width: 20%; z-index: 50; }
  
/* м…”н„° лІ„нҠј */
.layer-btn {
  position: absolute; bottom: -2%; left: 50%;
  transform: translateX(-50%);
  width: 13%; z-index: 20;
  cursor: pointer; pointer-events: all;
  transition: transform 0.1s; padding: 6px;
}
.layer-btn:active { transform: translateX(-50%) scale(0.92); }

/* мӣ№мә  мҠ¬лЎҜ 3к°ң */
.slots-wrap {
  position: absolute;
  top: 33%; left: 35%;
  width: 30%; height: 40%;
  z-index: 20;
  display: flex; flex-direction: column; gap: 13px;
}

.webcam-slot {
  flex: 1;
  background: rgba(240,235,220,0.6);
  border-radius: 3px;
  position: relative; overflow: hidden;
}
.webcam-slot.active   { outline: 2px solid rgba(100,120,200,0.5); outline-offset: -2px; }
.webcam-slot.captured { cursor: default; outline: none; }

.wslot-inner {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.wslot-video  { width:100%; height:100%; object-fit:cover; display:none; transform:scaleX(-1); }
.wslot-canvas { width:100%; height:100%; object-fit:cover; display:none; }

/* м№ҙмҡҙнҠёлӢӨмҡҙ */
.countdown-overlay {
  position: absolute; inset: 0; z-index: 6;
  background: rgba(0,0,0,0.45);
  display: none; align-items: center; justify-content: center;
  padding-top: 18px;
}
.countdown-num {
  font-family: 'Special Elite', serif;
  font-size: 42px; color: #fff;
  animation: countPop 0.4s ease;
}
/*м–‘мҳҶлІ„нҠјл“Ө*/
.side-btns {
  position: absolute;
  bottom: 3%;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 30;
}
.side-btn {
  width: 28%;
  cursor: pointer;
  transition: transform 0.1s;
}
.side-btn:active { transform: scale(0.92); }


/* --------------------------------
   3лӢЁкі„: нҳ„мғҒ кІ°кіј
-------------------------------- */
#s3-result { align-items: center; justify-content: center; }

.result-card {
  position: relative;
  width: min(340px, 95vw);
  height: min(523px, calc(95vw * 523 / 340));
  background-image: url('img/background.png');
  background-size: cover;
  background-position: center;
  animation: printSlide 1.2s cubic-bezier(0.22,1,0.36,1) 0.3s both;
}
.result-slots {
  position: absolute;
  top: 33%; left: 35%;
  width: 30%; height: 40%;
  z-index: 20;
  display: flex; flex-direction: column; gap: 13px;
}
.result-photo {
  flex: 1; width: 100%;
  object-fit: cover;
  border-radius: 3px;
  opacity: 0;
}
.result-photo.show { animation: showP 0.4s ease forwards; }
.result-btns {
  position: absolute;
  bottom: 3%; left: 50%;
  transform: translateX(-50%);
  width: 90%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 30;
}
.result-btn {
  width: 30%;
  cursor: pointer;
  transition: transform 0.1s;
}
.result-btn:active { transform: scale(0.92); }

/* --------------------------------
   м• лӢҲл©”мқҙм…ҳ
-------------------------------- */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes flyUp {
  from { transform:translateY(0); opacity:1; }
  to   { transform:translateY(-80px); opacity:0; }
}
@keyframes fadeIn {
  from { opacity:0; }
  to   { opacity:1; }
}
@keyframes countPop {
  from { transform:scale(1.5); opacity:0.3; }
  to   { transform:scale(1); opacity:1; }
}
@keyframes printSlide {
  from { transform:translateY(-105%); }
  80%  { transform:translateY(4px); }
  90%  { transform:translateY(-2px); }
  100% { transform:translateY(0); }
}
@keyframes showP {
  from { opacity:0; }
  to   { opacity:1; }
}
@keyframes screenIn {
  from { opacity:0; transform:scale(0.97); }
  to   { opacity:1; transform:scale(1); }
}
#s2-booth { animation: screenIn 0.6s ease both; }
</style>
</head>
<body>

<div class="flash-overlay" id="flash"></div>

<!-- 1лӢЁкі„: мқёнҠёлЎң -->
<div id="s1-intro" class="screen active">
  <div class="intro-wrap">
    <div class="intro-card">
      <!-- вң… мқёнҠёлЎң нғҖмқҙнӢҖ мқҙлҜём§Җ -->
      <img class="intro-title-img" id="introTitle" src="img/notragedy.png" alt="">
    </div>

  </div>
</div>

<!-- 2лӢЁкі„: нҸ¬нҶ л¶ҖмҠӨ л©”мқё -->
<div id="s2-booth" class="screen">
  <div class="booth-wrap">
    <div class="card">
      <!--  л Ҳмқҙм–ҙ мқҙлҜём§Җл“Ө: н•„мҡ”н•ң кІғл§Ң лӮЁкё°кі  src мұ„мҡ°кё° -->
      <img class="layer layer-title" src="img/notragedy.png" alt="">
      <img class="layer layer-clip"  src="img/pin.png" alt="">
      <img class="layer layer-frame"  src="img/frame.png" alt="">

      <!-- мӣ№мә  мҠ¬лЎҜ 3к°ң -->
      <div class="slots-wrap">
        <div class="webcam-slot active" id="slot0">
          <div class="wslot-inner">
            <video  class="wslot-video"  id="vid0" autoplay playsinline muted></video>
            <canvas class="wslot-canvas" id="cvs0"></canvas>
            <div class="countdown-overlay" id="cd0"><span class="countdown-num" id="cdNum0"></span></div>
          </div>
        </div>  
        
        <div class="webcam-slot" id="slot1">
          <div class="wslot-inner">
            <video  class="wslot-video"  id="vid1" autoplay playsinline muted></video>
            <canvas class="wslot-canvas" id="cvs1"></canvas>
            <div class="countdown-overlay" id="cd1"><span class="countdown-num" id="cdNum1"></span></div>
          </div>
        </div>
        <div class="webcam-slot" id="slot2">
          <div class="wslot-inner">
            <video  class="wslot-video"  id="vid2" autoplay playsinline muted></video>
            <canvas class="wslot-canvas" id="cvs2"></canvas>
            <div class="countdown-overlay" id="cd2"><span class="countdown-num" id="cdNum2"></span></div>
          </div>
        </div>
      </div>

      <img class="deco-layer deco-b1"    id="deco-b1"    src="img/b1.png" alt="">
      <img class="deco-layer deco-b2"    id="deco-b2"    src="img/b2.png" alt="">
      <img class="deco-layer deco-tape1" id="deco-tape1" src="img/tape1.png" alt="">
      <img class="deco-layer deco-tape2" id="deco-tape2" src="img/tape2.png" alt="">
      <img class="deco-layer deco-stamp" id="deco-stamp" src="img/stamp.png" alt="">
      <img class="deco-layer deco-seal"  id="deco-seal"  src="img/sealingwax.png" alt="">
      
      <div class="side-btns">
        <img class="side-btn" src="img/AGAIN.png" alt="again" onclick="goToBooth()">
        <div style="cursor:pointer;" onclick="shoot()">
          <img src="img/heart.png" id="heartBtn" alt="м…”н„°" style="width:60px; transition:transform 0.1s;" ontouchstart="this.style.transform='scale(0.92)'" ontouchend="this.style.transform='scale(1)'">
        </div>
        <img class="side-btn" id="printBtn" src="img/PRINT.png" alt="print" onclick="showDeco()">
      </div>
      
    </div>
  </div>
</div>

<!-- 3лӢЁкі„: нҳ„мғҒ кІ°кіј -->
<div id="s3-result" class="screen">
  <div style="position:relative;">
    <div class="result-card">
      <img class="layer layer-title" src="img/notragedy.png" alt="no tragedy">
      <img class="layer layer-frame" src="img/frame.png" alt="л ҲмқҙмҠӨ м•Ўмһҗ">
      <div class="result-slots">
        <img class="result-photo" id="rp0" src="" alt="">
        <img class="result-photo" id="rp1" src="" alt="">
        <img class="result-photo" id="rp2" src="" alt="">
      </div>
    </div>
  </div>
</div>

<script>
var slotCount = 3;
var ticker = 3;
var introDur = 3000;
var activeSlot = 0;
var shotCount = 0;
var shooting = false;
var stream = null;

// мқёнҠёлЎң лҒқлӮҳл©ҙ л©”мқёмңјлЎң
setTimeout(function(){
  var title = document.getElementById('introTitle');
  title.classList.add('fly-up');
  setTimeout(function(){
    showScreen('s2-booth');
    startCam();
  }, 600);
}, introDur);

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function startCam() {
  navigator.mediaDevices.getUserMedia({ video:{ facingMode:'user' }, audio:false })
    .then(function(s){ stream = s; attachCam(activeSlot); })
    .catch(function(){
      navigator.mediaDevices.getUserMedia({ video:true, audio:false })
        .then(function(s){ stream = s; attachCam(activeSlot); })
        .catch(function(){ console.warn('м№ҙл©”лқј к¶Ңн•ң м—ҶмқҢ'); });
    });
}

function attachCam(i) {
  for(var s = 0; s < slotCount; s++){
    var v = document.getElementById('vid' + s);
    v.style.display = 'none';
    v.srcObject = null;
  }
  if(!stream) return;
  var vid = document.getElementById('vid' + i);
  vid.srcObject = stream;
  vid.style.display = 'block';
}

function selectSlot(i) {
  if(shooting) return;
  activeSlot = i;
  for(var s = 0; s < slotCount; s++)
    document.getElementById('slot' + s).classList.toggle('active', s === i);
  if(!document.getElementById('slot' + i).classList.contains('captured'))
    attachCam(i);
}

function shoot() {
  if(shooting || !stream) return;
  var next = findEmpty();
  if(next === -1) return;
  shooting = true;
  activeSlot = next;
  for(var s = 0; s < slotCount; s++)
    document.getElementById('slot' + s).classList.toggle('active', s === next);
  countdown(next, ticker, function(){
    snap(next);
    shooting = false;
  });
}

function findEmpty() {
  for(var s = 0; s < slotCount; s++)
    if(!document.getElementById('slot' + s).classList.contains('captured')) return s;
  return -1;
}

function countdown(idx, n, done) {
  var ov  = document.getElementById('cd' + idx);
  var num = document.getElementById('cdNum' + idx);
  ov.style.display = 'flex';
  if(n <= 0){ ov.style.display = 'none'; done(); return; }
  num.textContent = n;
  num.style.animation = 'none';
  requestAnimationFrame(function(){ num.style.animation = 'countPop 0.4s ease'; });
  setTimeout(function(){ countdown(idx, n - 1, done); }, 1000);
}

function snap(idx) {
  var vid = document.getElementById('vid' + idx);
  var cvs = document.getElementById('cvs' + idx);
  cvs.width  = vid.videoWidth  || 640;
  cvs.height = vid.videoHeight || 480;
  var ctx = cvs.getContext('2d');
  ctx.translate(cvs.width, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(vid, 0, 0);

  // canvasлҘј imgлЎң ліҖнҷҳ
  var dataUrl = cvs.toDataURL('image/jpeg', 0.92);
  var snapImg = document.createElement('img');
  snapImg.src = dataUrl;
  snapImg.style.cssText = 'position:absolute; inset:0; width:100%; height:100%; object-fit:cover;';
  var inner = document.getElementById('slot' + idx).querySelector('.wslot-inner');
  inner.appendChild(snapImg);  // innerHTML м•Ҳ м§Җмҡ°кі  к·ёлғҘ мң„м—җ м–№кё°

  vid.style.display = 'none';
  document.getElementById('slot' + idx).classList.remove('active');
  document.getElementById('slot' + idx).classList.add('captured');
  shotCount++;
  flash();
  var next = findEmpty();
  if(next !== -1) attachCam(next);
}

function goToResult() {
  if(shotCount < slotCount) return;
  flash();
  if(stream){ stream.getTracks().forEach(function(t){ t.stop(); }); stream = null; }
  setTimeout(function(){
    for(var i = 0; i < slotCount; i++){
      var cvs = document.getElementById('cvs' + i);
      var rp  = document.getElementById('rp' + i);
      if(cvs.width > 0) rp.src = cvs.toDataURL('image/jpeg', 0.92);
    }
    showScreen('s3-result');
    for(var i = 0; i < slotCount; i++){
      (function(n){
        setTimeout(function(){
          document.getElementById('rp' + n).classList.add('show');
        }, 1300 + n * 280);
      })(i);
    }
  }, 300);
}

function goToBooth() {
  shotCount = 0; activeSlot = 0;
  for(var i = 0; i < slotCount; i++){
    document.getElementById('slot' + i).classList.remove('captured', 'active');
    var cvs = document.getElementById('cvs' + i);
    cvs.style.display = 'none'; cvs.width = 0;
    // мҠ¬лЎҜ м•Ҳм—җ м¶”к°Җлҗң snap мқҙлҜём§Җ м ңкұ°н•ҳкі  мӣҗлһҳ кө¬мЎ° ліөкө¬
    var inner = document.getElementById('slot' + i).querySelector('.wslot-inner');
    var snapImgs = inner.querySelectorAll('img');
    snapImgs.forEach(function(img){ img.remove(); });
    var vid = document.getElementById('vid' + i);
    vid.style.display = 'none';
    vid.srcObject = null;
    var rp = document.getElementById('rp' + i);
    if(rp){ rp.src = ''; rp.classList.remove('show'); }
  }
  // лҚ°мҪ” мҙҲкё°нҷ”
  var decos = ['deco-b1','deco-b2','deco-tape1','deco-tape2','deco-stamp','deco-seal'];
  decos.forEach(function(id){
    document.getElementById(id).classList.remove('show');
  });
  // н•ҳнҠё/PRINT лІ„нҠј ліөкө¬
  document.getElementById('heartBtn').style.display = 'block';
  document.getElementById('printBtn').src = 'img/PRINT.png';
  document.getElementById('printBtn').onclick = showDeco;

  document.getElementById('slot0').classList.add('active');
  showScreen('s2-booth');
  if(stream){ stream.getTracks().forEach(function(t){ t.stop(); }); stream = null; }
  startCam();
}

function showDeco() {
  if(shotCount < slotCount) return;
  // лҚ°мҪ” мқҙлҜём§Җ ліҙмқҙкё°
  var decos = ['deco-b1','deco-b2','deco-tape1','deco-tape2','deco-stamp','deco-seal'];
  decos.forEach(function(id, i){
    setTimeout(function(){
      document.getElementById(id).classList.add('show');
    }, i * 100);
  });
  
  // лІ„нҠј м „мІҙ мҲЁкё°кё°
  document.querySelector('.side-btns').style.display = 'none';
}

function flash() {
  var f = document.getElementById('flash');
  f.style.opacity = '1';
  setTimeout(function(){ f.style.opacity = '0'; }, 120);
}
</script>
</body>
</html>
