<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>TWS: PHOTOBOOTH</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: #d6eaf8;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* 화면 전환 */
.screen { display: none; width: 100%; min-height: 100vh; min-height: 100dvh; }
.screen.active { display: flex; align-items: center; justify-content: center; }

/* 플래시 */
.flash-overlay {
  position: fixed; inset: 0;
  background: #fff; opacity: 0;
  pointer-events: none; z-index: 9999;
  transition: opacity 0.08s;
}

/* --------------------------------
   1단계: 인트로
-------------------------------- */
.intro-wrap {
  position: relative;
  width: min(340px, 95vw);
}

.intro-card {
  position: relative;
  width: min(340px, 95vw);
  height: min(523px, calc(95vw * 523 / 340));
  /* ✅ 배경 이미지 */
  background-image: url('img/background.png');
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 인트로 위에 올라오는 이미지 */
.intro-title-img {
  width: 88%;
  animation: fadeUp 0.9s ease 0.3s both;
}
.intro-title-img.fly-up {
  animation: flyUp 0.6s cubic-bezier(0.4,0,0.2,1) forwards;
}



/* --------------------------------
   2단계: 포토부스 메인
-------------------------------- */
.booth-wrap {
  position: relative;
  width: min(340px, 95vw);
}

.card {
  position: relative;
  width: min(340px, 95vw);
  height: min(523px, calc(95vw * 523 / 340));
  /* ✅ 포토부스 프레임 배경 */
  background-image: url('img/background.png');
  background-size: cover;
  background-position: center;
}

/* 레이어 이미지들 */
.layer {
  position: absolute; left: 50%;
  transform: translateX(-50%);
  pointer-events: none;
}
.layer-title { top: 2%;  width: 85%; z-index: 20; }
.layer-clip  { top: 18%; width: 22%; z-index: 40; }
.layer-frame { bottom: 8%; width: 85%; z-index: 10; }

/* 셔터 버튼 */
.layer-btn {
  position: absolute; bottom: -2%; left: 50%;
  transform: translateX(-50%);
  width: 13%; z-index: 20;
  cursor: pointer; pointer-events: all;
  transition: transform 0.1s; padding: 6px;
}
.layer-btn:active { transform: translateX(-50%) scale(0.92); }

/* 웹캠 슬롯 3개 */
.slots-wrap {
  position: absolute;
  top: 28%; left: 22%;
  width: 55%; height: 48%;
  z-index: 20;
  display: flex; flex-direction: column; gap: 6px;
}

.webcam-slot {
  flex: 1;
  background: rgba(240,235,220,0.6);
  border-radius: 3px;
  position: relative; overflow: hidden;
}
.webcam-slot.active   { outline: 2px solid rgba(100,120,200,0.5); outline-offset: -2px; }
.webcam-slot.captured { cursor: default; outline: none; }

.wslot-inner {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.wslot-video  { width:100%; height:100%; object-fit:cover; display:none; transform:scaleX(-1); }
.wslot-canvas { width:100%; height:100%; object-fit:cover; display:none; }

/* 카운트다운 */
.countdown-overlay {
  position: absolute; inset: 0; z-index: 6;
  background: rgba(0,0,0,0.45);
  display: none; align-items: center; justify-content: center;
}
.countdown-num {
  font-family: 'Special Elite', serif;
  font-size: 42px; color: #fff;
  animation: countPop 0.4s ease;
}

/* 현상하기 버튼 */
.develop-btn {
  position: absolute; bottom: 0.2%; left: 50%;
  transform: translateX(-50%);
  padding: 4px 16px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.25);
  font-family: 'Special Elite', serif;
  font-size: 9px; letter-spacing: 1.5px;
  cursor: not-allowed; border-radius: 10px;
  white-space: nowrap; z-index: 25;
  transition: all 0.2s; -webkit-appearance: none;
}
.develop-btn.on {
  background: rgba(255,255,255,0.28);
  border-color: rgba(255,255,255,0.65);
  color: #fff; cursor: pointer;
}
.develop-btn.on:active { transform: translateX(-50%) scale(0.96); }

/* --------------------------------
   3단계: 현상 결과
-------------------------------- */
#s3-result {
  flex-direction: column;
  gap: 0;
}

/* 프린터 머신 상단 */
.printer-machine {
  width: min(340px, 95vw);
  background: linear-gradient(180deg, #c8c8d8 0%, #a0a0b8 100%);
  border-radius: 8px 8px 0 0;
  padding: 10px 16px 8px;
  display: flex; align-items: center; justify-content: space-between;
  border: 1.5px solid #888;
  border-bottom: none;
  z-index: 10;
  animation: fadeIn 0.5s ease both;
}
.printer-label { font-family:'Special Elite',serif; font-size:9px; color:#555; letter-spacing:2px; }
.printer-dots  { display:flex; gap:5px; }
.p-dot { width:8px; height:8px; border-radius:50%; background:#888; }
.p-dot.on { background:#5a8a5a; box-shadow:0 0 4px rgba(90,138,90,0.6); }

/* 프린터 슬롯 */
.printer-slot {
  width: min(340px, 95vw);
  height: 18px;
  background: linear-gradient(180deg, #666 0%, #444 100%);
  border-left: 1.5px solid #888;
  border-right: 1.5px solid #888;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; z-index: 10;
}
.printer-slot-inner { width:85%; height:6px; background:#222; border-radius:3px; }

/* 결과 카드 */
.result-card-wrap {
  width: min(340px, 95vw);
  overflow: hidden;
  position: relative;
}
.result-card {
  position: relative;
  width: 100%;
  height: min(523px, calc(95vw * 523 / 340));
  /* ✅ 결과 화면 배경 프레임 */
  background-image: url('img/frame.png');
  background-size: cover; background-position: center;
  animation: printSlide 1.2s cubic-bezier(0.22,1,0.36,1) 0.3s both;
}

/* 결과 슬롯 (찍힌 사진 3개) */
.result-slots {
  position: absolute;
  top: 38%; left: 35%;
  width: 30%; height: 35%;
  z-index: 20;
  display: flex; flex-direction: column; gap: 6px;
}
.result-photo {
  flex: 1;
  width: 100%;
  object-fit: cover;
  border-radius: 3px;
  opacity: 0;
}
.result-photo.show { animation: showP 0.4s ease forwards; }

/* 하단 버튼 */
.result-actions {
  width: min(340px, 95vw);
  background: rgba(180,195,220,0.3);
  border: 1px solid rgba(120,150,200,0.3);
  border-top: none;
  border-radius: 0 0 8px 8px;
  display: flex; gap: 8px;
  padding: 10px 12px;
  animation: fadeIn 0.5s ease 1.8s both;
  opacity: 0;
}
.res-btn {
  flex: 1; padding: 8px 0;
  background: rgba(200,215,240,0.6);
  border: 1px solid rgba(120,150,210,0.4);
  color: rgba(40,60,130,0.8);
  font-family: 'Special Elite', serif; font-size: 11px;
  cursor: pointer; border-radius: 14px;
  transition: all 0.15s;
  -webkit-appearance: none; text-align: center;
}
.res-btn:active { transform: scale(0.96); }
.res-btn.primary {
  background: rgba(230,175,195,0.6);
  border-color: rgba(190,120,150,0.4);
  color: rgba(100,30,70,0.85);
}

/* --------------------------------
   애니메이션
-------------------------------- */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes flyUp {
  from { transform:translateY(0); opacity:1; }
  to   { transform:translateY(-80px); opacity:0; }
}
@keyframes fadeIn {
  from { opacity:0; }
  to   { opacity:1; }
}
@keyframes countPop {
  from { transform:scale(1.5); opacity:0.3; }
  to   { transform:scale(1); opacity:1; }
}
@keyframes printSlide {
  from { transform:translateY(-105%); }
  80%  { transform:translateY(4px); }
  90%  { transform:translateY(-2px); }
  100% { transform:translateY(0); }
}
@keyframes showP {
  from { opacity:0; }
  to   { opacity:1; }
}
@keyframes screenIn {
  from { opacity:0; transform:scale(0.97); }
  to   { opacity:1; transform:scale(1); }
}
#s2-booth { animation: screenIn 0.6s ease both; }
</style>
</head>
<body>

<div class="flash-overlay" id="flash"></div>

<!-- 1단계: 인트로 -->
<div id="s1-intro" class="screen active">
  <div class="intro-wrap">
    <div class="intro-card">
      <!-- ✅ 인트로 타이틀 이미지 -->
      <img class="intro-title-img" id="introTitle" src="img/notragedy.png" alt="">
    </div>

  </div>
</div>

<!-- 2단계: 포토부스 메인 -->
<div id="s2-booth" class="screen">
  <div class="booth-wrap">
    <div class="card">
      <!--  레이어 이미지들: 필요한 것만 남기고 src 채우기 -->
      <img class="layer layer-title" src="img/notragedy.png" alt="">
      <img class="layer layer-clip"  src="img/pin.png" alt="">
      <img class="layer layer-frame"  src="img/frame.png" alt="">

      <!-- 웹캠 슬롯 3개 -->
      <div class="slots-wrap">
        <div class="webcam-slot active" id="slot0">
          <div class="wslot-inner">
            <video  class="wslot-video"  id="vid0" autoplay playsinline muted></video>
            <canvas class="wslot-canvas" id="cvs0"></canvas>
            <div class="countdown-overlay" id="cd0"><span class="countdown-num" id="cdNum0"></span></div>
          </div>
        </div>
        <div class="webcam-slot" id="slot1">
          <div class="wslot-inner">
            <video  class="wslot-video"  id="vid1" autoplay playsinline muted></video>
            <canvas class="wslot-canvas" id="cvs1"></canvas>
            <div class="countdown-overlay" id="cd1"><span class="countdown-num" id="cdNum1"></span></div>
          </div>
        </div>
        <div class="webcam-slot" id="slot2">
          <div class="wslot-inner">
            <video  class="wslot-video"  id="vid2" autoplay playsinline muted></video>
            <canvas class="wslot-canvas" id="cvs2"></canvas>
            <div class="countdown-overlay" id="cd2"><span class="countdown-num" id="cdNum2"></span></div>
          </div>
        </div>
      </div>

      <!-- ✅ 셔터 버튼 이미지: src 채우기 -->
      <div style="position:absolute; bottom:1.5%; left:50%; transform:translateX(-50%); z-index:30; cursor:pointer; text-align:center;" onclick="shoot()">
        <img src="img/heart.png" alt="셔터" style="width:60px; display:block; transition:transform 0.1s;" ontouchstart="this.style.transform='scale(0.92)'" ontouchend="this.style.transform='scale(1)'">
      </div>

      <button class="develop-btn" id="developBtn" onclick="goToResult()">DEVELOP</button>
    </div>
  </div>
</div>

<!-- 3단계: 현상 결과 -->
<div id="s3-result" class="screen">
  <div class="printer-machine">
    <span class="printer-label">PRINTING...</span>
    <div class="printer-dots">
      <div class="p-dot"></div>
      <div class="p-dot"></div>
      <div class="p-dot on"></div>
    </div>
  </div>
  <div class="printer-slot"><div class="printer-slot-inner"></div></div>
  <div class="result-card-wrap">
    <div class="result-card">
      <!-- 찍힌 사진 3개 -->
      <div class="result-slots">
        <img class="result-photo" id="rp0" src="" alt="">
        <img class="result-photo" id="rp1" src="" alt="">
        <img class="result-photo" id="rp2" src="" alt="">
      </div>
    </div>
  </div>
  <div class="result-actions">
    <button class="res-btn" onclick="goToBooth()">RETAKE</button>
    <button class="res-btn primary" onclick="savePhoto()">SAVE</button>
  </div>
</div>

<script>
var slotCount = 3;
var ticker = 3;
var introDur = 3000;
var activeSlot = 0;
var shotCount = 0;
var shooting = false;
var stream = null;

// 인트로 끝나면 메인으로
setTimeout(function(){
  var title = document.getElementById('introTitle');
  title.classList.add('fly-up');
  setTimeout(function(){
    showScreen('s2-booth');
    startCam();
  }, 600);
}, introDur);

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function startCam() {
  navigator.mediaDevices.getUserMedia({ video:{ facingMode:'user' }, audio:false })
    .then(function(s){ stream = s; attachCam(activeSlot); })
    .catch(function(){
      navigator.mediaDevices.getUserMedia({ video:true, audio:false })
        .then(function(s){ stream = s; attachCam(activeSlot); })
        .catch(function(){ console.warn('카메라 권한 없음'); });
    });
}

function attachCam(i) {
  for(var s = 0; s < slotCount; s++){
    var v = document.getElementById('vid' + s);
    v.style.display = 'none';
    v.srcObject = null;
  }
  if(!stream) return;
  var vid = document.getElementById('vid' + i);
  vid.srcObject = stream;
  vid.style.display = 'block';
}

function selectSlot(i) {
  if(shooting) return;
  activeSlot = i;
  for(var s = 0; s < slotCount; s++)
    document.getElementById('slot' + s).classList.toggle('active', s === i);
  if(!document.getElementById('slot' + i).classList.contains('captured'))
    attachCam(i);
}

function shoot() {
  if(shooting || !stream) return;
  var next = findEmpty();
  if(next === -1) return;
  shooting = true;
  activeSlot = next;
  for(var s = 0; s < slotCount; s++)
    document.getElementById('slot' + s).classList.toggle('active', s === next);
  countdown(next, ticker, function(){
    snap(next);
    shooting = false;
  });
}

function findEmpty() {
  for(var s = 0; s < slotCount; s++)
    if(!document.getElementById('slot' + s).classList.contains('captured')) return s;
  return -1;
}

function countdown(idx, n, done) {
  var ov  = document.getElementById('cd' + idx);
  var num = document.getElementById('cdNum' + idx);
  ov.style.display = 'flex';
  if(n <= 0){ ov.style.display = 'none'; done(); return; }
  num.textContent = n;
  num.style.animation = 'none';
  requestAnimationFrame(function(){ num.style.animation = 'countPop 0.4s ease'; });
  setTimeout(function(){ countdown(idx, n - 1, done); }, 1000);
}

function snap(idx) {
  var vid = document.getElementById('vid' + idx);
  var cvs = document.getElementById('cvs' + idx);
  cvs.width  = vid.videoWidth  || 640;
  cvs.height = vid.videoHeight || 480;
  var ctx = cvs.getContext('2d');
  ctx.translate(cvs.width, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(vid, 0, 0);
  vid.style.display = 'none';
  cvs.style.display = 'block';
  document.getElementById('slot' + idx).classList.remove('active');
  document.getElementById('slot' + idx).classList.add('captured');
  shotCount++;
  flash();
  if(shotCount >= slotCount)
    document.getElementById('developBtn').classList.add('on');
}

function goToResult() {
  if(shotCount < slotCount) return;
  flash();
  if(stream){ stream.getTracks().forEach(function(t){ t.stop(); }); stream = null; }
  setTimeout(function(){
    for(var i = 0; i < slotCount; i++){
      var cvs = document.getElementById('cvs' + i);
      var rp  = document.getElementById('rp' + i);
      if(cvs.width > 0) rp.src = cvs.toDataURL('image/jpeg', 0.92);
    }
    showScreen('s3-result');
    for(var i = 0; i < slotCount; i++){
      (function(n){
        setTimeout(function(){
          document.getElementById('rp' + n).classList.add('show');
        }, 1300 + n * 280);
      })(i);
    }
  }, 300);
}

function goToBooth() {
  shotCount = 0; activeSlot = 0;
  for(var i = 0; i < slotCount; i++){
    document.getElementById('slot' + i).classList.remove('captured', 'active');
    var cvs = document.getElementById('cvs' + i);
    cvs.style.display = 'none'; cvs.width = 0;
    var rp = document.getElementById('rp' + i);
    if(rp){ rp.src = ''; rp.classList.remove('show'); }
  }
  document.getElementById('slot0').classList.add('active');
  document.getElementById('developBtn').classList.remove('on');
  showScreen('s2-booth');
  startCam();
}
function savePhoto() {
  var ua = navigator.userAgent;
  if(/iPad|iPhone|iPod/.test(ua))   alert('전원 + 볼륨업 동시에 눌러 저장하세요!');
  else if(/Android/.test(ua))       alert('전원 + 볼륨다운 동시에 눌러 저장하세요!');
  else                               alert('스크린샷 또는 Ctrl+P로 저장해 주세요!');
}

function flash() {
  var f = document.getElementById('flash');
  f.style.opacity = '1';
  setTimeout(function(){ f.style.opacity = '0'; }, 120);
}
</script>
</body>
</html>
